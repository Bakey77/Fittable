<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身健康助手</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .chat-box {
            border: 1px solid #ddd;
            height: 450px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        .msg { margin: 8px 0; }
        .user {
            color: #1a73e8;
            font-weight: bold;
        }
        .ai {
            color: #333;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .ai::before {
            content: "AI: ";
            color: #888;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        #msg {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #msg:focus {
            outline: none;
            border-color: #1a73e8;
        }
        button {
            padding: 10px 20px;
            background: #1a73e8;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .intent-tag {
            font-size: 12px;
            color: #888;
            margin-left: 5px;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .session-row {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .session-row input {
            flex: 1;
            padding: 8px 10px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-clear {
            padding: 8px 14px;
            background: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
        }
        .btn-clear:hover { background: #c0392b; }
        .ai-meta {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <h1>🏋️ 健身健康助手</h1>

    <div class="session-row">
        <input id="sessionInput" placeholder="session_id（留空自动生成）">
        <button class="btn-clear" onclick="clearSession()">清空记忆</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-row">
        <input id="msg" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')send()">
        <button onclick="send()" id="sendBtn">发送</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <script>
        let isLoading = false;
        const isLocalBackendOrigin =
            (window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost") &&
            window.location.port === "8000";
        const API_BASE = isLocalBackendOrigin ? "" : "http://127.0.0.1:8000";

        function apiUrl(path) {
            return `${API_BASE}${path}`;
        }

        async function send() {
            const input = document.getElementById("msg");
            const text = input.value.trim();
            if (!text || isLoading) return;
            const sessionInput = document.getElementById("sessionInput");
            const sessionId = sessionInput.value.trim();

            const errorEl = document.getElementById("errorMsg");
            errorEl.textContent = "";
            isLoading = true;
            document.getElementById("sendBtn").disabled = true;
            input.value = "";

            const box = document.getElementById("chatBox");

            // 用户消息
            box.innerHTML += `<div class="msg user">你: ${escapeHtml(text)}</div>`;

            // AI 消息占位
            const aiDiv = document.createElement("div");
            aiDiv.className = "msg ai";
            const intentTag = document.createElement("span");
            intentTag.className = "intent-tag";
            const textSpan = document.createElement("span");
            const aiMeta = document.createElement("div");
            aiMeta.className = "ai-meta";
            aiDiv.appendChild(intentTag);
            aiDiv.appendChild(textSpan);
            aiDiv.appendChild(aiMeta);
            box.appendChild(aiDiv);

            // 收集文本
            let fullText = "";
            let buffer = "";

            try {
                const payload = {message: text};
                if (sessionId) payload.session_id = sessionId;

                const resp = await fetch(apiUrl("/chat/stream"), {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(payload)
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    throw new Error(`HTTP ${resp.status}: ${errText || "请求失败"}`);
                }
                if (!resp.body) {
                    throw new Error("后端未返回流式响应体");
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, {stream: true});
                    const events = buffer.split("\n\n");
                    buffer = events.pop() || "";

                    for (const evt of events) {
                        const lines = evt.split("\n");
                        for (const line of lines) {
                            if (!line.startsWith("data: ")) continue;

                            const data = line.slice(6);
                            if (data === "[DONE]") continue;

                            // 先尝试解析 JSON（session_id / intent / error）
                            try {
                                const obj = JSON.parse(data);
                                // 只对 JSON 对象使用 continue；primitive 值（数字/布尔等）走下面文本处理
                                if (typeof obj === "object" && obj !== null && !Array.isArray(obj)) {
                                    if (obj.session_id) {
                                        sessionInput.value = obj.session_id;
                                    }
                                    if (obj.intent) {
                                        intentTag.textContent = `[${obj.intent}] `;
                                        fullText += `\n`;
                                    }
                                    if (obj.error) {
                                        fullText += `\n错误: ${obj.error}`;
                                        textSpan.textContent = fullText;
                                    }
                                    continue;
                                }
                            } catch {
                                // 不是 JSON，就是普通文本字符（含换行、空格等）
                            }

                            // 普通文本字符：保留原样，包括换行和空格
                            if (data) {
                                fullText += data;
                                textSpan.textContent = fullText;
                            }
                        }
                    }
                }

                aiMeta.textContent = `status: 完整`;

            } catch (err) {
                errorEl.textContent = "请求失败: " + err.message;
                aiDiv.innerHTML = `<span style="color:#e74c3c">请求失败: ${escapeHtml(err.message)}</span>`;
            } finally {
                isLoading = false;
                document.getElementById("sendBtn").disabled = false;
                box.scrollTop = box.scrollHeight;
            }
        }

        async function clearSession() {
            const sid = document.getElementById("sessionInput").value.trim();
            if (!sid) {
                alert("请先输入要清空的 session_id");
                return;
            }
            if (!confirm(`确定要清空 session "${sid}" 的记忆吗？`)) return;

            try {
                const resp = await fetch(apiUrl("/clear-session"), {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({session_id: sid})
                });
                const data = await resp.json();
                if (data.success) {
                    document.getElementById("chatBox").innerHTML = "";
                    document.getElementById("sessionInput").value = "";
                }
            } catch (err) {
                alert("清空失败: " + err.message);
            }
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
